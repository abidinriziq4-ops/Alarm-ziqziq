<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sholat App</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color:white;
  overflow:hidden;
}

/* HEADER */
.header {
  padding:20px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

/* SLIDER */
.container {
  display:flex;
  width:300%;
  height:calc(100vh - 70px);
  transition:0.4s ease;
}

.page {
  width:100%;
  padding:15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius:18px;
  padding:15px;
  margin-bottom:15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* JAM */
#clock {
  font-size:42px;
  text-align:center;
  margin:20px 0;
  font-weight:bold;
}

/* BUTTON */
button {
  background: linear-gradient(45deg,#22c55e,#4ade80);
  border:none;
  padding:10px 15px;
  border-radius:10px;
  color:white;
}

/* INPUT */
select,input {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}

/* NAV BAWAH */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  height:70px;
  background:#020617;
  display:flex;
  justify-content:space-around;
  align-items:center;
  border-top:1px solid rgba(255,255,255,0.1);
}

.nav button {
  background:none;
  color:#94a3b8;
  font-size:14px;
}

.nav button.active {
  color:#22c55e;
}

/* ANIMASI */
.fade {
  animation:fade 0.4s;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<div class="header">🕌 Sholat App</div>

<div id="slider" class="container">

  <!-- HOME -->
  <div class="page fade">
    <div id="clock"></div>

    <div class="card">
      <label>Pilih Kota</label>
      <select id="kota" onchange="setKota()">
        <option>Surabaya</option>
        <option>Jakarta</option>
        <option>Bandung</option>
        <option>Medan</option>
      </select>
    </div>

    <div class="card">
      <h3>Jadwal Sholat</h3>
      <p id="subuh"></p>
      <p id="dzuhur"></p>
      <p id="ashar"></p>
      <p id="maghrib"></p>
      <p id="isya"></p>
    </div>
  </div>

  <!-- ALARM -->
  <div class="page">
    <div class="card">
      <label>Mode Alarm</label>
      <select id="alarmMode">
        <option value="azan">Adzan</option>
        <option value="biasa">Biasa</option>
      </select>
    </div>

    <div class="card">
      <label>Alarm Manual</label>
      <input type="time" id="manualTime">
      <button onclick="setManualAlarm()">Set Alarm</button>
    </div>
  </div>

  <!-- INFO -->
  <div class="page">
    <div class="card">
      <h3>Tentang</h3>
      <p>Aplikasi Jam Sholat Premium</p>
      <p>By Kamu 🔥</p>
    </div>
  </div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="goPage(0,this)" class="active">Home</button>
  <button onclick="goPage(1,this)">Alarm</button>
  <button onclick="goPage(2,this)">Info</button>
</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jam Sholat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h2>Jam Sholat</h2>

<h1 id="clock">Loading...</h1>

<select id="kota">
  <option>Surabaya</option>
  <option>Jakarta</option>
</select>
<button onclick="setKota()">Ambil</button>

<div id="subuh"></div>
<div id="dzuhur"></div>
<div id="ashar"></div>
<div id="maghrib"></div>
<div id="isya"></div>

<br><br>

<select id="alarmMode">
  <option value="azan">Adzan</option>
  <option value="biasa">Biasa</option>
</select>

<br><br>

<input type="time" id="manualTime">
<button onclick="setManualAlarm()">Set Alarm</button>

<script src="script.js"></script>

</body>
</html>
